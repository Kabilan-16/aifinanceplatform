name: Dev Server with ngrok

on:
  workflow_dispatch:

jobs:
  run-app:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" >> .env
          echo "CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}" >> .env 

      - name: Start dev server
        run: |
          npm run dev &
          sleep 10

      - name: Verify app is running
        run: |
          for i in {1..10}; do
            if nc -z localhost 3000; then
              echo "✅ App is running on port 3000"
              exit 0
            else
              echo "Waiting for app..."
              sleep 5
            fi
          done
          echo "❌ App failed to start"
          exit 1

      # -----------------------------
      # NGROK SETUP
      # -----------------------------
      - name: Install ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com jammy main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update
          sudo apt install -y ngrok

      - name: Authenticate ngrok
        run: ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Start ngrok tunnel
        run: |
          ngrok http 3000 --log=stdout &
          sleep 10

      - name: Get ngrok URL
        run: |
          JSON=$(curl -s http://127.0.0.1:4040/api/tunnels)
          URL=$(echo "$JSON" | jq -r '.tunnels[] | select(.proto=="https") | .public_url')
          if [ -z "$URL" ]; then
            echo "❌ Failed to get ngrok URL"
            echo "$JSON"
            exit 1
          fi
          echo "🔗 Public URL: $URL"
          echo "NGROK_URL=$URL" >> $GITHUB_ENV
          echo "### 🚀 App URL: $URL" >> $GITHUB_STEP_SUMMARY

      # -----------------------------
      # KEEP JOB ALIVE (important)
      # -----------------------------
      - name: Keep server alive
        run: |
          echo "App is live. Keeping workflow running..."
          sleep 3600